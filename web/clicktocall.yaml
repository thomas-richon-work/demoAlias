openapi: 3.1.0
info:
  title: Alias Public API Documentation
servers:
  - url: http://api-alias-preprod.itn.intraorange:443/v1
    description: Generated server url
paths:
  /contexts/{contextId}/voicemail/greeting:
    put:
      tags:
        - contexts-controller
      summary: 'Define a customized greeting message for the voicemail (of the virtual number linked to the context) - NB: erase the default greeting '
      operationId: setVoicemailGreeting
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: X-VNumbers-Service-Id
          in: header
          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: contextId
          in: path
          description: The technical ID of the context
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TTSMessage'
        required: true
      responses:
        '200':
          description: The message has been set
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/TTSMessage'
        '400':
          description: Some parameters are missing or invalid<br>[1129] Your greeting message is too long, please reduce it
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: |-
            [1103] The given serviceId doesn't exist for the authenticated partner<br>
            [1105] The context has expired<br>
            [1106] The action is not allowed for the context because its PIN code has not been confirmed yet<br>
            [1109] The action is not allowed for the context because it has not the VOICEMAIL capability
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/TTSMessage'
        '404':
          description: The context doesn't exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: |-
            [1127] The Request is submitted multiple times, please retry after 1 seconds.
            For idempotency handling,
             - Idempotency handling does not consider parameters (except for clicktocall and outbound call initiation) 
            -  Idempotency handling does consider the content of the body and the following headers: 
                - X-OAPI-Application-Id Header 
               - X-VNumbers-Service-Id Header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - contexts-controller
      summary: 'Delete the customized greeting message details of the voicemail (of the virtual number linked to the context) - NB: set the default greeting back'
      operationId: removeVoicemailGreeting
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: X-VNumbers-Service-Id
          in: header
          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: contextId
          in: path
          description: The technical ID of the context
          required: true
          schema:
            type: string
      responses:
        '204':
          description: The message has been removed
        '400':
          description: Some parameters are missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: |-
            [1103] The given serviceId doesn't exist for the authenticated partner<br>
            [1105] The context has expired<br>
            [1106] The action is not allowed for the context because its PIN code has not been confirmed yet<br>
            [1109] The action is not allowed for the context because it has not the VOICEMAIL capability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: The context doesn't exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /contexts/{contextId}/notifications/registration:
    get:
      tags:
        - contexts-controller
      summary: Get notification registration details
      operationId: getMobileAppRegistration
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: X-VNumbers-Service-Id
          in: header
          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: contextId
          in: path
          description: The technical ID of the context
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The registration has been found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/NotificationRegistration'
        '204':
          description: No registration exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '400':
          description: Some parameters are missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: |-
            [1103] The given serviceId doesn't exist for the authenticated partner<br>
            [1105] The context has expired<br>
            [1106] The action is not allowed for the context because its PIN code has not been confirmed yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: The context doesn't exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    put:
      tags:
        - contexts-controller
      summary: Register the mobile application for push notifications
      operationId: setMobileAppRegistration
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: X-VNumbers-Service-Id
          in: header
          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: contextId
          in: path
          description: The technical ID of the context
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationRegistration'
        required: true
      responses:
        '200':
          description: The registration has been done
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/NotificationRegistration'
        '400':
          description: Some parameters are missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: |-
            [1103] The given serviceId doesn't exist for the authenticated partner<br>
            [1105] The context has expired<br>
            [1106] The action is not allowed for the context because its PIN code has not been confirmed yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: The context doesn't exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: |-
            [1127] The Request is submitted multiple times, please retry after 1 seconds.
            For idempotency handling,
             - Idempotency handling does not consider parameters (except for clicktocall and outbound call initiation) 
            -  Idempotency handling does consider the content of the body and the following headers: 
                - X-OAPI-Application-Id Header 
               - X-VNumbers-Service-Id Header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /contexts/{contextId}/donotdisturb:
    get:
      tags:
        - contexts-controller
      summary: Get the configuration of automatic calls forwarding ("do not disturb" mode)
      operationId: getDndConfig
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: X-VNumbers-Service-Id
          in: header
          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: contextId
          in: path
          description: The technical ID of the context
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The configuration has been found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/DoNotDisturbConfig'
        '204':
          description: No configuration exists
          content:
            application/json: {}
        '400':
          description: Some parameters are missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: |-
            [1103] The given serviceId doesn't exist for the authenticated partner<br>
            [1105] The context has expired<br>
            [1106] The action is not allowed for the context because its PIN code has not been confirmed yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: The context doesn't exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    put:
      tags:
        - contexts-controller
      summary: Define the configuration of automatic calls forwarding ("do not disturb" mode)
      operationId: setDndConfig
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: X-VNumbers-Service-Id
          in: header
          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: contextId
          in: path
          description: The technical ID of the context
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoNotDisturbConfig'
        required: true
      responses:
        '200':
          description: The configuration has been set
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/DoNotDisturbConfig'
        '400':
          description: |-
            Some parameters are missing or invalid<br>
            [24] Invalid value for mode, allowed values are [absence, presence]
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: |-
            [1103] The given serviceId doesn't exist for the authenticated partner<br>
            [1105] The context has expired<br>
            [1106] The action is not allowed for the context because its PIN code has not been confirmed yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: The context doesn't exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: |-
            [1115] The modification for do not disturb is not allowed for unassigned number.<br>
            [1127] The Request is submitted multiple times, please retry after 1 seconds.
            For idempotency handling,
             - Idempotency handling does not consider parameters (except for clicktocall and outbound call initiation)
             -  Idempotency handling does consider the content of the body and the following headers:
                 - X-OAPI-Application-Id Header
                 - X-VNumbers-Service-Id Header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - contexts-controller
      summary: Clear the configuration of automatic calls forwarding ("do not disturb" mode)
      operationId: deleteDndConfig
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: X-VNumbers-Service-Id
          in: header
          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: contextId
          in: path
          description: The technical ID of the context
          required: true
          schema:
            type: string
      responses:
        '204':
          description: The configuration has been cleared
        '400':
          description: Some parameters are missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: |-
            [1103] The given serviceId doesn't exist for the authenticated partner<br>
            [1105] The context has expired<br>
            [1106] The action is not allowed for the context because its PIN code has not been confirmed yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: The context doesn't exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: |
            [1115] The deletion for do not disturb is not allowed for unassigned number.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /contexts/{contextId}/donotdisturb/fullmode:
    get:
      tags:
        - contexts-controller
      summary: Get the configuration of the full "do not disturb" mode
      operationId: getDndFullMode
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: X-VNumbers-Service-Id
          in: header
          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: contextId
          in: path
          description: The technical ID of the context
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The configuration has been found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/DoNotDisturbFullMode'
        '400':
          description: Some parameters are missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: |-
            [1103] The given serviceId doesn't exist for the authenticated partner<br>
            [1105] The context has expired<br>
            [1106] The action is not allowed for the context because its PIN code has not been confirmed yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: The context doesn't exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    put:
      tags:
        - contexts-controller
      summary: Set the configuration of the full "do not disturb" mode
      operationId: setDndFullMode
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: X-VNumbers-Service-Id
          in: header
          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: contextId
          in: path
          description: The technical ID of the context
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoNotDisturbFullMode'
        required: true
      responses:
        '200':
          description: The configuration has been set
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/DoNotDisturbFullMode'
        '400':
          description: Some parameters are missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: |-
            [1103] The given serviceId doesn't exist for the authenticated partner<br>
            [1105] The context has expired<br>
            [1109] The action is not allowed for the context because it has not the required capability VOICEMAIL, SHARED_VOICEMAIL<br>
            [1106] The action is not allowed for the context because its PIN code has not been confirmed yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: The context doesn't exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: |-
            [1115] The modification for do not disturb is not allowed for unassigned number.<br>
            [1127] The Request is submitted multiple times, please retry after 1 seconds.
            For idempotency handling,
             - Idempotency handling does not consider parameters (except for clicktocall and outbound call initiation)
             -  Idempotency handling does consider the content of the body and the following headers:
                 - X-OAPI-Application-Id Header
                 - X-VNumbers-Service-Id Header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /contexts/{contextId}/calls/{callId}/flags/read:
    put:
      tags:
        - contexts-controller
      summary: Change the reading flag of a call-log
      operationId: setCallReadingFlag
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: X-VNumbers-Service-Id
          in: header
          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: contextId
          in: path
          description: The technical ID of the context
          required: true
          schema:
            type: string
        - name: callId
          in: path
          description: The technical ID of the call-log
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReadingFlag'
        required: true
      responses:
        '200':
          description: The flag has been updated
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CallHistory'
        '400':
          description: Some parameters are missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: |-
            [1103] The given serviceId doesn't exist for the authenticated partner<br>
            [1105] The context has expired<br>
            [1106] The action is not allowed for the context because its PIN code has not been confirmed yet<br>
            [1109] The action is not allowed for the context because it has not the CALL_IN or CALL_OUT capability
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CallHistory'
        '404':
          description: The context doesn't exist<br>the call-log doesn't exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: |-
            [1127] The Request is submitted multiple times, please retry after 1 seconds.
            For idempotency handling,
             - Idempotency handling does not consider parameters (except for clicktocall and outbound call initiation) 
            -  Idempotency handling does consider the content of the body and the following headers: 
                - X-OAPI-Application-Id Header 
               - X-VNumbers-Service-Id Header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /anbservices/{serviceId}/externalnumbers/{number}/voicemail/greeting:
    put:
      tags:
        - external-number-controller
      summary: Define a customized greeting message for the external number
      operationId: setExternalNumberGreetingMsg
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: serviceId
          in: path
          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: number
          in: path
          description: The phone number (can be a short one, must begin with a valid international prefix, without the '+')
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TTSMessageSpeak'
        required: true
      responses:
        '200':
          description: The message has been set
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/TTSMessageSpeak'
        '400':
          description: Some parameters are missing or invalid<br>[1129] Your greeting message is too long, please reduce it
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: '[1103] The given serviceId doesn’t exist for the authenticated partner <br>[1107] The service is not allowed to handle external numbers'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: '[60] Number not found'
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/TTSMessageSpeak'
        '409':
          description: |-
            [1115] The external number doesn't has the correct VoicemailType for the operation
            [1127] The Request is submitted multiple times, please retry after 1 seconds.
            For idempotency handling:
              - Idempotency handling does not consider parameters (except for clicktocall and outbound call initiation)
              -  Idempotency handling does consider the content of the body and the following headers:
                 - X-OAPI-Application-Id Header
                 - X-VNumbers-Service-Id Header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /anbservices/{serviceId}/externalnumbers/{number}/voicemail/greeting/audio:
    get:
      tags:
        - external-number-controller
      summary: Get the audio greeting for the alias number
      operationId: getAudioGreetingForExternalNumber
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: serviceId
          in: path
          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: number
          in: path
          description: The phone number (can be a short one, must begin with a valid international prefix, without the '+')
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The audio greeting has been found
          content:
            audio/x-wav:
              schema:
                type: string
                format: byte
        '400':
          description: Some parameters are missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: |-
            The authenticated application is not authorized<br>
                [1107] Unknown service <br>
                [1107] The service is not allowed to handle external numbers <br>
                [1107] Number is in PENDING status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: '[60] The number doesn''t exist'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: '[1115] The external number doesn''t has the correct VoicemailType for the operation'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    put:
      tags:
        - external-number-controller
      summary: Update an audio greeting for the alias number
      operationId: updateAudioGreetingForTheAliasNumber
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: serviceId
          in: path
          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: number
          in: path
          description: The phone number (can be a short one, must begin with a valid international prefix, without the '+')
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: byte
              description: The audio greeting. WAV file.
        required: true
      responses:
        '200':
          description: The audio greeting has been updated
        '400':
          description: Some parameters are missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: The authenticated application is not authorized<br>[1107] The service is not allowed to handle external numbers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: The service doesn't exist<br>The number doesn't exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: '[1117] The external number is not shareable'
        '413':
          description: The audio file size exceeds the limit (1MB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '415':
          description: The payload format is in an unsupported format, should be WAV file. The Content-Type header should be 'application/octet-stream'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - external-number-controller
      summary: Deletes the audio greeting message for the alias number
      operationId: deleteExternalNumberGreetingAudioMsg
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: serviceId
          in: path
          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: number
          in: path
          description: The phone number (can be a short one, must begin with a valid international prefix, without the '+')
          required: true
          schema:
            type: string
      responses:
        '204':
          description: The audio greeting has been deleted successfully
        '400':
          description: Some parameters are missing or invalid
          content:
            application/json:
              schema:

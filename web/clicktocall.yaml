  /contexts:
    get:
      tags:
        - contexts-controller
      summary: List the usage contexts of the service
      operationId: getContexts
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: X-VNumbers-Service-Id
          in: header
          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: userNumber
          in: query
          description: Filter on userNumber (contains)
          required: false
          schema:
            type: string
        - name: aliasNumber
          in: query
          description: Filter on aliasNumber (contains)
          required: false
          schema:
            type: string
        - name: status
          in: query
          description: Filter on context status (equals)
          required: false
          schema:
            type: string
            enum:
              - ACTIVATED
              - PENDING
              - CLOSED
        - name: login
          in: query
          description: Filter on owner info login (equals)
          required: false
          schema:
            type: string
        - name: isPreferredInbound
          in: query
          description: Filter on owner info isPreferredInbound (equals)
          required: false
          schema:
            type: boolean
        - name: isPreferredOutbound
          in: query
          description: Filter on owner info isPreferredOutbound (equals)
          required: false
          schema:
            type: boolean
        - name: email
          in: query
          description: Filter on owner info email (equals)
          required: false
          schema:
            type: string
        - name: expirationDate
          in: query
          description: 'Filter on expiration date (interval, partial interval allowed, start date included/end date excluded dates format: ISO-8601 with timezone (ex. ''1994-11-05T08:15:30.0-05:00,1994-11-05T18:15:30.0Z'')'
          required: false
          schema:
            type: string
        - name: creationDate
          in: query
          description: 'Filter on creation date (interval, partial interval allowed, start date included/end date excluded dates format: ISO-8601 with timezone (ex. ''1994-11-05T08:15:30.0-05:00,1994-11-05T18:15:30.0Z'')'
          required: false
          schema:
            type: string
        - name: offset
          in: query
          description: The index of the first element to retrieve. Zero is the first element of the collection
          required: false
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
        - name: limit
          in: query
          description: The maximum number of elements to retrieve (capped at 100)
          required: false
          schema:
            type: integer
            format: int32
            default: 100
            maximum: 100
            minimum: 1
        - name: sort
          in: query
          description: 'The field used to sort the elements (''id'' by default). Sorting direction is asc by default, add minus (''-'') for desc. Allowed values: [id, aliasNumber, userNumber, creationDate, expirationDate, status]'
          required: false
          schema:
            type: string
      responses:
        '200':
          description: The contexts have been found
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsageContext'
        '400':
          description: Some parameters are missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: '[1103] The given serviceId doesn''t exist for the authenticated partner<br>[50] Access denied: Application not registered'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
        - contexts-controller
      summary: Create a new usage context (link an alias number to a MSISDN)
      operationId: postContext
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: X-VNumbers-Service-Id
          in: header
          description: The technical ID of the service
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsageContextToCreate'
        required: true
      responses:
        '201':
          description: The context has been created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageContext'
        '400':
          description: Some parameters are missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: |-
            [1103] The given serviceId doesn't exist for the authenticated partner <br>
            [1104] The requested aliasing is not allowed <br>
            [1107] The service is not allowed to use external number <br>
            [1112] The country code mapping between alias and user numbers is not allowed <br>
            [1120] The user number is an alias number <br>
            [1109] Missing capability <br>
            [1118] The external number has not been activated <br>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: |-
            [1101] There is no virtual number available in the pool <br>
            [1102] The maximum of active contexts for this user number has been reached<br> There is already an active context for the user using the requested alias number <br>
            [1115] The chosen capabilities are not compatible with the alias number <br>
            [1117] There is already an active context using this alias <br>
            [1115] The chosen capabilities are not compatible with the service provided <br>
            [1115] The externalNumber supplied does not has a valid voicemailType, the correct values are aliasNumber and userNumber <br>
            [1115] The external number used does not allow UnassignedNumbers <br>
            [1107] The userNumber can not be an UnassignedNumber (33770230000:1100, 33770231200:2200, 33770232300:9999) <br>
            [1127] The Request is submitted multiple times, please retry after 1 seconds. <br>
                     For idempotency handling: <br>
                      - Idempotency handling does not consider parameters (except for clicktocall and outbound call initiation) <br>
                      -  Idempotency handling does consider the content of the body and the following headers:
                         - X-OAPI-Application-Id Header <br>
                         - X-VNumbers-Service-Id Header <br>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

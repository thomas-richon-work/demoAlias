          description: The technical ID of the service
          required: true
          schema:
            type: string
        - name: type
          in: query
          description: Filter on the object type of event.
          required: false
          schema:
            type: string
            enum:
              - CONTEXT
              - ROUTE
              - ROUTEGROUP
              - SMS
              - VOICE_MESSAGE
              - RCS
        - name: id
          in: query
          description: Filter on Object Id as contextId, routeId or routeGroupId
          required: false
          schema:
            type: string
        - name: offset
          in: query
          description: The index of the first element to retrieve. Zero is the first element of the collection
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: limit
          in: query
          description: The maximum number of elements to retrieve (capped at 100)
          required: false
          schema:
            type: integer
            format: int32
            default: 100
        - name: sort
          in: query
          description: The field used to sort the elements on eventTimeStamp. Sorting direction is desc (new-old) by default, use [asc] for (old-new) ascending.
          required: false
          schema:
            type: string
        - name: eventName
          in: query
          description: |-
            Filter on the event name.<br/>
            [CALL_PICKUP] Event will be triggered once AN recognize the callee pickup the call.<br/>
            [CALL_END] Event will be triggered once AN received a hangup event.<br/>
          required: false
          schema:
            type: string
            enum:
              - CREATE
              - UPDATE
              - RCS_UPDATE
              - DELETE
              - DND_FULL_MODE_TRUE
              - DND_FULL_MODE_FALSE
              - INBOUND_CALL
              - CALL_PICKUP
              - CALL_END
              - NEW_VOICEMAIL_MESSAGE
              - EMPTY_VOICEMAIL_MESSAGE
              - NEW_SHARED_VOICEMAIL_MESSAGE
              - EMPTY_SHARED_VOICEMAIL_MESSAGE
              - SMS_MO
              - SMS_MT
        - name: eventTimeStampFrom
          in: query
          description: 'Filter on date From,  dates format: ISO-8601 with timezone (ex. ''1994-11-05T18:15:30.0Z'')'
          required: false
          schema:
            type: string
        - name: eventTimeStampTo
          in: query
          description: 'Filter on date To,  dates format: ISO-8601 with timezone (ex. ''1994-11-05T18:15:30.0Z'')'
          required: false
          schema:
            type: string
        - name: read
          in: query
          description: Filter on read flag
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: The events have been found
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventResponse'
        '400':
          description: Some parameters are missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: The authenticated application is not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: The service doesn't exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
components:
  schemas:
    TTSMessage:
      type: object
      properties:
        speak:
          type: array
          items:
            $ref: '#/components/schemas/TTSMessageSpeak'
      required:
        - speak
    TTSMessageSpeak:
      type: object
      properties:
        message:
          type: string
          description: The text of the message must pass both validations:<ul><li>The text message should not exceed <b>500</b> characters for voicemail</li><li>The text message should not exceed <b>5000</b> characters for other types </li><li>The text message will be vocalized into an audio file, the file size should not exceed <b>3MB</b></li></ul>- In case of failure in either validations we return BODY_LIMIT_EXCEEDED
        voice:
          type: integer
          format: int32
          description: The voice which will be used by the vocal server.<br>
        gender:
          type: string
          description: The gender of the voice which will be used by the vocal server.<br>MALE or FEMALE values are accepted.
          enum:
            - MALE
            - FEMALE
        language:
          type: string
          description: The language of the message
      required:
        - gender
        - language
        - message
        - voice
    ApiError:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: The error code
        message:
          type: string
          description: The short description of the error
        description:
          type: string
          description: The full description of the error
      required:
        - code
        - description
        - message
    NotificationRegistration:
      type: object
      properties:
        platform:
          type: string
          description: The notification platform
          enum:
            - google
            - apple
            - huawei
        applicationId:
          type: string
          description: The application identifier (as declared in EventApi enabler)
        registrationId:
          type: string
          description: The registration ID
        active:
          type: boolean
          description: Indicates if the notifications are active or not.<br> Default is true
      required:
        - applicationId
        - platform
        - registrationId
    CalendarEvent:
      type: object
      properties:
        start:
          type: string
          description: The start date of the first event<br>format ISO-8601 with timezone (ex. 1994-11-05T08:15:30.0-05:00 or 1994-11-05T13:15:30.0Z)
        end:
          type: string
          description: The end date of the first event<br>format ISO-8601 with timezone (ex. 1994-11-05T08:15:30.0-05:00 or 1994-11-05T13:15:30.0Z)
        recurrence:
          type: string
          description: 'The recurrence rule (if none defined, the event is ponctual)<br>RFC-2445 RRULE expression (ex. for all working days ''RRULE:FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR'')<br> Allowed frequencies: WEEKLY, MONTHLY, YEARLY'
      required:
        - end
        - start
    DoNotDisturbConfig:
      type: object
      properties:
        redirectionNumber:
          type: string
          description: The phone number to which calls will be redirected. International format (ex. +33655887446).<br>Use the keyword 'VOICEMAIL' to redirect to the internal voice-mail
        schedule:
          type: array
          description: The period(s) of "do not disturb".<br> At least one event must be scheduled
          items:
            $ref: '#/components/schemas/CalendarEvent'
        absenceMessage:
          $ref: '#/components/schemas/TTSMessage'
          description: The TTS parameters of the message which is played to anyone who calls the virtual number during the "do not disturb" period(s)<br>One language allowed
        active:
          type: boolean
          description: Indicates if the configuration is active or not.<br> Default is true
        mode:
          type: string
          default: absence
          description: Describes the availability of the agent during the schedule. absence means agent will not be available. presence means agent will be available.
          enum:
            - absence
            - presence
      required:
        - absenceMessage
        - redirectionNumber
        - schedule
    DoNotDisturbFullMode:
      type: object
      properties:
        active:
          type: boolean
          description: Indicates if the configuration is active or not
        redirectionNumber:
          type: string
          description: The phone number to which calls will be redirected. International format (ex. +33655887446).<br>Use the keyword 'VOICEMAIL' to redirect to the internal voice-mail
      required:
        - active
        - redirectionNumber
    ReadingFlag:
      type: object
      properties:
        read:
          type: boolean
      required:
        - read
    CallHistory:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: The technical ID of the call session
        caller:
          type: string
          description: The caller phone number<br>International format (ex. +33655887446)
        callee:
          type: string
          description: The callee phone number<br>International format (ex. +33655887446)
        startDate:
          type: string
          description: The start date of the call<br>ISO format (e.g. 2014-07-11T11:52:01.123Z)
        endDate:
          type: string
          description: The end date of the call<br>ISO format (e.g. 2014-07-11T11:52:01.123Z)
        duration:
          type: integer
          format: int64
          description: The duration between pickup and end of call (in seconds)
        direction:
          type: string
          description: The direction of the call <br> inbound, outbound, voicemailConsultation
        read:
          type: boolean
          description: Reading flag
        dndActivated:
          type: boolean
          description: Indicates if the 'do not disturb' mode was activated
        pickupDate:
          type: string
          description: The pickup date of the call<br>ISO format (e.g. 2014-07-11T11:52:01.123Z)
        note:
          type: string
          description: add note be able to report who performed the calls
        voicemailMessageDuration:
          type: number
          format: double
          description: voicemail message duration in seconds
        voicemailId:
          type: string
          description: voicemail message identifier
      required:
        - callee
        - caller
        - direction
        - dndActivated
        - duration
        - endDate
        - id
        - pickupDate
        - read
        - startDate
    ExternalReferenceRequest:
      type: object
      description: If no routeGroup with such an externalReference exists, a new routeGroup is created.
      properties:
        application:
          type: string
          description: ExternalReference application key
        reference:
          type: string
          description: ExternalReference reference key
    RouteGroupRequest:
      type: object
      properties:
        routeGroupId:
          type: string
          description: Route group uuid identifier
        externalReferences:
          type: array
          description: Route group external reference identifier <br>if it's provided along with the routeGroupId then the routeGroup will be updated with new list <br>if it's provided alone then a new routeGroup will be created with new list
          items:
            $ref: '#/components/schemas/ExternalReferenceRequest'
    RouteToCreate:
      type: object
      properties:
        userNumber:
          type: string
          description: The end-user (real) phone number<br>International format (ex. +33655887446)
        note:
          type: string
          description: Custom note. Maximum 2000 chars
        noVoice:
          type: boolean
          description: FLag to control the noVoice behaviour. Default value is 'False'
        routeGroup:
          $ref: '#/components/schemas/RouteGroupRequest'
          description: The reference for the route group [optional]
      required:
        - userNumber
    CallConfirmation:
      type: object
      properties:
        clickToCallConfirmation:
          type: boolean
          default: 'true'
          description: |
            A flag to control the click to call confirmation played message.<br>
    ExternalReferenceBase:
      type: object
      properties:
        application:
          type: string
          description: ExternalReference application key
        reference:
          type: string
          description: ExternalReference reference key
    OwnerInfo:
      type: object
      description: The information of the context's owner
      properties:
        login:
          type: string
          description: Owner login. Max 50 characters
        email:
          type: string
          description: Owner email. Max 50 characters
        isPreferredInbound:
          type: boolean
          description: External field. (Does not impact Alias Numbers Platform)
        isPreferredOutbound:
          type: boolean
          description: External field. (Does not impact Alias Numbers Platform)
        jnote:
          type: string
          description: Note must be in Json format
    RCSInfoResponse:
      type: object
      properties:
        enabled:
          type: boolean
          description: Show If RCS is enabled for the route or not
        lastUpdatedDate:
          type: string
          description: The Last date when the RCS flag has been updated
    Route:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Route Identifier
        callerNumber:
          type: string
          description: The caller phone number<br>International format (ex. +33655887446)
        note:
          type: string
          description: Custom note. Maximum 2000 chars.
        startDate:
          type: string
          description: The creation date of the route<br>UTC time, ISO format (e.g. 2014-07-11T11:52:01.123Z)
        endDate:
          type: string
          format: date-time
          description: The end date of the route<br>UTC time, ISO format (e.g. 2014-07-11T11:52:01.123Z)
        isConversationalSMSAllowed:
          type: string
          description: 'Whether it is possible for an agent to initiate an SMS conversation with a customer<br/>Possible values: [na, yes, no]<br/>Default value: ''na''<br/>To set this field, refer to <b> PUT /sms/numbers/customernumbers/{msisdn}/isconversationalsmsallowed on alias-sms documentation</b>'
        noVoice:
          type: boolean
          description: FLag to control the noVoice behaviour
        rcsInfo:
          $ref: '#/components/schemas/RCSInfoResponse'
          description: RCS Information
        context:
          $ref: '#/components/schemas/UsageContext'
          description: The targeted context
        routeGroup:
          $ref: '#/components/schemas/RouteGroupBase'
      required:
        - callerNumber
        - context
        - endDate
        - id
        - startDate
    RouteGroupBase:
      type: object
      properties:
        id:
          type: string
          description: Technical identifier
        aliasNumber:
          type: string
          description: The alias phone number International format (ex. +33655887446)
        userNumber:
          type: string
          description: The end-user (real) phone number International format (ex. +33655887446)
        creationDate:
          type: string
          format: date-time
          description: The creation date UTC time, ISO format (e.g. 2022-07-11T11:52:01.123Z)
        endDate:
          type: string
          format: date-time
          description: The end date UTC time, ISO format (e.g. 2022-07-11T11:52:01.123Z)
        plannedEndDate:
          type: string
          format: date-time
          description: The planned end date UTC time, ISO format (e.g. 2023-07-11T11:52:01.123Z)
        comment:
          type: string
          description: A free text
        custom:
          type: string
          description: Could be any object
        active:
          type: boolean
          description: Flag to identify if the record is active or not
        lastModifiedDate:
          type: string
          format: date-time
          description: The last modification date UTC time, ISO format (e.g. 2022-07-11T11:52:01.123Z)
        externalReferences:
          type: array
          description: List of external references
          items:
            $ref: '#/components/schemas/ExternalReferenceBase'
    UsageContext:
      type: object
      properties:
        id:
          type: string
          description: The technical ID of the context
        userNumber:
          type: string
          description: The end-user (real) phone number<br>International format (ex. +33655887446)
        aliasNumber:
          type: string
          description: The alias phone number<br>International format (ex. +33655887446)
        creationDate:
          type: string
          format: date-time
          description: The creation date of the context in UTC time and ISO format
          example: '2014-07-11T11:52:01.123Z'
          readOnly: true
        expirationDate:
          type: string
          format: date-time
          deprecated: true
          description: The expiration date of the context in UTC time and ISO format
          example: '2014-07-11T11:52:01.123Z'
          readOnly: true
        capabilities:
          type: array
          items:
            description: |-
              The capabilities the context.<br>
                  CALL_IN enables inbound calls<br>
                  CALL_OUT enables outbound calls<br>
                  VOICEMAIL enables voicemail features<br>
                  SHARED_VOICEMAIL enables shared voicemail feature<br>
                  SMS_MO (Mobile Originated) enables SMS sending<br>
                  SMS_MT (Mobile Terminated) enables SMS reception
            enum:
              - CALL_IN
              - CALL_OUT
              - SMS_MO
              - SMS_MT
          uniqueItems: true
        status:
          type: string
          description: 'The status of the context<br> PENDING: the context must be validated to become operational<br> ACTIVATED: the context has been activated, the context is fully operational<br> CLOSED: the context has been expired and closed<br> '
        note:
          type: string
          description: Custom note
        adminTag:
          type: boolean
          default: 'false'
          deprecated: true
          description: Admin tag. When a context tagged as admin expires or is deactivated, all the contexts sharing the same alias numbers are deactivated too
          readOnly: true
        smsNotificationEmail:
          type: string
          description: An email to receive the SMS notifications
        voicemailConfiguration:
          $ref: '#/components/schemas/VoicemailConfiguration'
          description: Mailbox configuration
        ownerInfo:
          $ref: '#/components/schemas/OwnerInfo'
        unassignedNumber:
          type: boolean
          description: The userNumber used is an unassignedNumber
        callConfirmation:
          $ref: '#/components/schemas/CallConfirmation'
          description: |
            Configuration to control the call confirmation played message.<br>
      required:
        - adminTag
        - aliasNumber
        - capabilities
        - creationDate
        - expirationDate
        - id
        - note
        - status
        - userNumber
    VoicemailConfiguration:
      type: object
      properties:
        notifyForEmptyMessage:
          type: boolean
          description: This boolean indicates whether the notify for empty message is active or not [default value is true]
    PrivateCallsMode:
      type: object
      properties:
        enabled:
          type: boolean
          description: If true, all outbound calls placed with this external number will be anonymous
      required:
        - enabled
    PreferredContact:
      type: object
      properties:
        userNumber:
          type: string
          description: The end-user (real) phone number<br>International format (ex. +33655887446)
      required:
        - userNumber
    FailureHandlingConfiguration:
      type: object
      properties:
        mode:
          type: string
          description: 'The way of handling the call when no contact has been found<br> HANGUP: hang up the call<br> REDIRECT_TO_MESSAGE: redirect the call to a specified TTS message<br> REDIRECT_TO_NUMBER: redirect the call to a specified phone number<br> REDIRECT_TO_ALIAS_VOICEMAIL: redirect the call to a shared alias voicemail<br> Default value is ''HANGUP''<br>'
        failureRedirectionMessage:
          $ref: '#/components/schemas/TTSMessage'
          description: The redirection message (for REDIRECT_TO_MESSAGE mode only)<br>One language allowed
        failureRedirectionNumber:
          type: string
          description: The redirection number (for REDIRECT_TO_NUMBER mode only). International format (ex. +33655887446)<br> Must be of type Mobile, Fixed number or VOIP
        mirroredRouteFailureMessages:
          type: array
          description: 'List of Failure Messages Configuration for MIRRORED_ROUTES '
          items:
            $ref: '#/components/schemas/MirroredRouteFailureMessage'
      required:
        - mode
    InboundCallsHandling:
      type: object
      properties:
        mode:
          type: string
          description: 'The handling mode<br>PREFERRED_CONTACT: link the caller to the preferred contact<br>LAST_CALL_SEARCH: link the caller to his last contact<br>ROUTES: link the caller to his dedicated contact<br>MIRRORED_ROUTES: link the caller to his dedicated contact'
        config:
          $ref: '#/components/schemas/InboundCallsHandlingConfiguration'
          description: The specific configuration for the chosen handling mode
        preferredRedirectionNumber:
          type: string
          description: Optional number to be used instead of the preferred contact in case of modes [PREFERRED_CONTACT , LAST_CALL_SEARCH]<br>Must be of type Mobile, Fixed number or VOIP <br>Must not equal the same external number
      required:
        - mode
    InboundCallsHandlingConfiguration:
      type: object
      properties:
        lastCallHandling:
          $ref: '#/components/schemas/LastCallHandlingConfiguration'
          description: Configuration of the 'LAST_CALL_SEARCH' mode
        failureHandling:
          $ref: '#/components/schemas/FailureHandlingConfiguration'
          description: Configuration of the behaviour in case of contact search failure
        smsFailureHandling:
          $ref: '#/components/schemas/SMSConfiguration'
          description: Configuration of the behaviour in case of failed to handle incoming SMS
    LastCallHandlingConfiguration:
      type: object
      properties:
        delayBeforePreferredRedirection:
          type: integer
          format: int64
          description: 'Delay (in minutes) for selecting the last contact. After this delay, the caller is linked to the preferred contact of the shared number<br>Minimum: 0  - Maximum: 10080'
          maximum: 10080
          minimum: 0
        delayBeforeFailureRedirection:
          type: integer
          format: int64
          description: 'Delay (in minutes) for selecting the last contact. After this delay, the failure behaviour is performed<br>When associated to delayBeforePreferredRedirection, this delay must be the greatest<br>Minimum: 0 - Maximum: 518400 '
          maximum: 518400
          minimum: 0
        unknownCallerHandlingMode:
          type: string
          description: 'The handling mode for unknown callers<br>FAILURE: Call is redirected to failureHandling Mode<br>REDIRECT_TO_PREFERRED: link the caller to the preferred contact'
    MirroredRouteFailureMessage:
      type: object
      properties:
        failureType:
          type: string
          description: The type of failure message. It can be either 'ROUTE_CLOSED' or 'NO_ROUTE_EVER_EXISTED'
        speak:
          type: array
          description: The list of TTS messages to be played
          items:
            $ref: '#/components/schemas/TTSMessageSpeak'
      required:
        - failureType
        - speak
    SMSConfiguration:
      type: object
      properties:
        failureEmail:
          type: string
          description: The Email that will be notified in case of failed to handle incoming SMS
        noRouteEverExistedMsg:
          type: string
          description: The Message that will be sent in case of there is no routes exists
        routeClosedMsg:
          type: string
          description: The Message that will be sent in case of the route is closed
    ExternalNumberToCreate:
      type: object
      properties:
        shareable:
          type: boolean
          description: Indicates if this number can be used as shared alias
        note:
          type: string
          description: Custom note. Maximum 2000 chars.
        voicemailType:
          type: string
          description: The type of the voice mail associated to the number. <br> aliasNumber, userNumber, null
        voicemailConfig:
          $ref: '#/components/schemas/VoicemailConfig'
          description: The voicemail config data which will create a shared voicemail that would be used in failure call handling
      required:
        - shareable
    VoicemailConfig:
      type: object
      properties:
        enabled:
          type: boolean
          description: Flag to decide to create a voicemail for the external number or not
        notificationEmail:
          type: string
          description: Add an email notification to the created voicemail box
    ExternalNumber:
      type: object
      properties:
        number:
          type: string
          description: The phone number<br>can be a short number (ex. +333900) - must begin with a valid international prefix
        shareable:
          type: boolean
          description: Indicates if this number can be used as shared alias
        inboundCapacities:
          type: array
          description: The capacities of the number for inbound communications <br> CALL,SMS
          items:
            type: string
        status:
          type: string
          description: The status of the number. <br> PENDING, ACTIVE
        creationDate:
          type: string
          format: date-time
          description: The date of creation<br>UTC time, ISO format (e.g. 2014-07-11T11:52:01.123Z)
        contexts:
          type: array
          description: |-
            The context(s) to which the number is currently linked (limited to 100 first results).

             An empty list is returned when calling the following endpoints:
             1- GET /anbservices/{serviceId}/externalnumbers
          items:
            $ref: '#/components/schemas/UsageContext'
        note:
          type: string
          description: Custom note. Maximum 2000 chars.
        voicemailType:
          type: string
          description: The type of the voice mail associated to the number. <br> aliasNumber, userNumber, null
        voiceMailConfig:
          $ref: '#/components/schemas/VoicemailConfig'
          description: The voice mail config associated to the number
      required:
        - contexts
        - creationDate
        - inboundCapacities
        - number
        - shareable
        - status
    OsAliasServiceConfig:
      type: object
      properties:
        sip:
          $ref: '#/components/schemas/OsSipConfig'
          description: The configuration of SIP headers for outgoing call legs
      required:
        - sip
    OsSipConfig:
      type: object
      properties:
        inboundCallPresentedUri:
          $ref: '#/components/schemas/PresentedUriConfig'
          description: The configuration of the presented URI for inbound calls
    PresentedUriConfig:
      type: object
      properties:
        type:
          type: string
          description: The value displayed in the presented URICALLER for the external caller number<br>PLATFORM for the technical service number<br>CALLER_ALIAS for the alias number of the external caller number<br>
    RingingTimeoutConfig:
      type: object
      properties:
        inboundCall:
          type: integer
          format: int32
          description: Ringing timeout for inbound calls (in seconds) [min=5, max=40]
        outboundCall:
          type: integer
          format: int32
          description: Ringing timeout for outbound calls (in seconds) [min=5, max=40]
    SMSConfig:
      type: object
      properties:
        smsMoEnabled:
          type: boolean
          description: The SMS Enabler default value = false
        smsDefaultFailureMessage:
          type: string
          description: The value of SMS default failure message , This Message will be sent if no suitable message has been found
        smsRecipientCheckRoutesMode:
          type: boolean
          description: The value of SMS recipient check routes mode default value = false
        smsFailureEmail:
          type: string
          description: The value of SMS failure email (email is required if smsEnabled = true and smsRecipientCheckRoutesMode = false)
    ServiceConfig:
      type: object
      properties:
        ttsMessages:
          $ref: '#/components/schemas/TTSMessages'
          description: Configuration of the Text-To-Speech messages used by the service
        pickupInboundCall:
          type: boolean
          description: Indicates if the media server automatically picks-up the call on call reception
        pickupOutboundCall:
          type: boolean
          description: Indicates if the media server automatically picks-up on outbound call emission
        inboundCallFlow:
          type: string
          description: 'The call-flow for inbound calls.<br>DIRECT: A-Party is directly connected to B-Party (aliased number)<br>TWO_STEPS: B-Party has to accept the incoming call before being connected with A-Party via confirmation call<br>API_DRIVEN: B-Party has to accept the incoming call before being connected with A-Party using APIs<br> DIRECT,TWO-STEPS, API_DRIVEN'
        ringingTimeout:
          $ref: '#/components/schemas/RingingTimeoutConfig'
          description: The configuration of ringing timeouts
        pincodeValidationMaxTries:
          type: integer

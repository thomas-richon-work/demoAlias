      operationId: getFilteredSmsListByServiceId
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The App Id
          required: true
          schema:
            type: string
        - name: X-VNumbers-Service-Id
          in: header
          description: The Service Id
          required: true
          schema:
            type: string
        - name: smsIdFrom
          in: query
          description: Filter on SMSId - Minimum value = 1
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
          example: 10152
        - name: smsIdTo
          in: query
          description: Filter on SMSId  - Minimum value = 1
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
          example: 10152
        - name: smsTimestampFrom
          in: query
          description: 'Filter on receivedTimestamp. Format: ISO-8601 with timezone'
          required: false
          schema:
            type: string
          example: '1994-11-05T08:15:30.0Z'
        - name: smsTimestampTo
          in: query
          description: 'Filter on receivedTimestamp. Format: ISO-8601 with timezone'
          required: false
          schema:
            type: string
          example: '1994-11-05T08:15:30.0Z'
        - name: expeditionTimestampFrom
          in: query
          description: 'Filter on expeditionTimestamp. Format: ISO-8601 with timezone'
          required: false
          schema:
            type: string
          example: '1994-11-05T08:15:30.0Z'
        - name: expeditionTimestampTo
          in: query
          description: 'Filter on expeditionTimestamp. Format: ISO-8601 with timezone'
          required: false
          schema:
            type: string
          example: '1994-11-05T08:15:30.0Z'
        - name: routeId
          in: query
          description: Filter on the Id of the route. Minimum value = 1
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: routeIdFrom
          in: query
          description: Filter on the routeId - Minimum value = 1
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
          example: 14526
        - name: routeIdTo
          in: query
          description: Filter on the routeId - Minimum value = 1
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
          example: 14526
        - name: direction
          in: query
          description: Filter on sms direction
          required: false
          schema:
            type: string
            default: both
            enum:
              - inbound
              - outbound
              - both
        - name: inboundAliasStatus
          in: query
          description: Filter on inboundAliasStatus
          required: false
          schema:
            type: string
            enum:
              - NO_ROUTE_EVER_EXISTED
              - ROUTE_CLOSED
              - NO_INBOUND_RULE_SET
              - ROUTE_EXISTS
              - EXTERNALLY_HANDLED
              - NO_SMS_EMAIL_NOTIFICATION
        - name: outboundStatus
          in: query
          description: Filter on the Outbound status
          required: false
          schema:
            type: string
            enum:
              - WAITING
              - SUCCESS
              - FAILED
              - UNREACHABLE
              - INPROGRESS
              - CANCELED
              - REJECTED
              - BLACKLISTED
              - DROPPED
              - UNREACHABLE_ADDRESS
              - EXPIRED
        - name: limit
          in: query
          description: The maximum number of elements to retrieve (capped at 100), minimum = 1
          required: false
          schema:
            type: integer
            format: int32
            default: 100
            maximum: 100
            minimum: 1
        - name: offset
          in: query
          description: The index of the first element to retrieve. Zero is the first element of the collection
          required: false
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
        - name: sender
          in: query
          description: Filter on the sender number
          required: false
          schema:
            type: string
        - name: receiver
          in: query
          description: Filter on the receiver number
          required: false
          schema:
            type: string
        - name: bSMSPartyNumber
          in: query
          description: The bSMSPartyNumber is the number of the customer that is not the externalNumber (aliasNumber) nor the userNumber. Will be among sender or receiver<br> It  should not be sent with '+'
          required: false
          schema:
            type: string
        - name: userNumber
          in: query
          description: Filter on the userNumber
          required: false
          schema:
            type: string
        - name: externalNumber
          in: query
          description: Filter on the externalNumber
          required: false
          schema:
            type: string
        - name: sort
          in: query
          description: Sort the elements by id. Sorting direction is descending mode by default
          required: false
          schema:
            type: string
            default: desc
            enum:
              - desc
              - asc
        - name: read
          in: query
          description: Filter according to the read status of the SMS which can be set to false or to true
          required: false
          schema:
            type: boolean
        - name: messageId
          in: query
          description: Filter on messageId of the external sms
          required: false
          schema:
            type: string
        - name: source
          in: query
          description: Filter on source of the external sms
          required: false
          schema:
            type: string
        - name: broker
          in: query
          description: Filter on the provider which used to handle the SMS
          required: false
          schema:
            type: string
            enum:
              - CEO
              - SCRIBE
              - BYPASS
        - name: showHiddenSms
          in: query
          description: A flag to show the hidden SMS
          required: false
          schema:
            type: boolean
            default: false
        - name: nbOfDuplicatesFrom
          in: query
          description: Filter on the nbOfDuplicates - Minimum value = 0
          required: false
          schema:
            type: integer
            format: int64
            minimum: 0
          example: 0
        - name: nbOfDuplicatesTo
          in: query
          description: Filter on the nbOfDuplicates - Minimum value = 0
          required: false
          schema:
            type: integer
            format: int64
            minimum: 0
          example: 1
        - name: messagesGroupId
          in: query
          description: Filter on the Id of the group of messages related to this message
          required: false
          schema:
            type: string
        - name: agentId
          in: query
          description: Filter by RCS agent ID
          required: false
          schema:
            type: string
      responses:
        '200':
          description: The details of a given SMS has been retrieved
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SmsResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: |-
            [1103] The given serviceId doesn't exist for the authenticated partner.

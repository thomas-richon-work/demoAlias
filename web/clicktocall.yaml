      required:
        - inboundCallFlow
        - pickupInboundCall
        - pickupOutboundCall
        - pincodeValidationMaxDelay
        - pincodeValidationMaxTries
        - ringingTimeout
        - ttsMessages
    ServiceDetails:
      type: object
      description: The service to create.
      properties:
        id:
          type: string
          description: The technical ID of the service
        name:
          type: string
          description: The name of the service<br>alphanumerics, accented chars, spaces, ',  -,  ., _
        mainCountryCode:
          type: string
          description: The main country of the service<br>Should have the ISO 3166-1 alpha-2 format (ex. FR)<br>ISO 3166-1 alpha-2 (ex. FR)
        smsConfig:
          $ref: '#/components/schemas/SMSConfig'
          description: The configuration of the SMS
        config:
          $ref: '#/components/schemas/ServiceConfig'
          description: The configuration of the service
        osConfig:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/OsAliasServiceConfig'
          description: OS-specific configurations
      required:
        - config
        - id
        - mainCountryCode
        - name
        - osConfig
    SipConfig:
      type: object
      properties:
        inboundCallPresentedUri:
          $ref: '#/components/schemas/PresentedUriConfig'
          description: The configuration of the presented URI for inbound calls
        addDiversionHeader:
          type: boolean
          description: Indicates if a diversion header containing the platform number must be added to outgoing call legs
    TTSMessages:
      type: object
      description: Configuration of the Text-To-Speech messages used by the service
      properties:
        welcome:
          $ref: '#/components/schemas/TTSMessage'
          description: 'The TTS parameters of the message which is played to anyone who calls the virtual number (before linking)<br>One language allowed<br>Required if pickupInboundCall = true '
        wait:
          $ref: '#/components/schemas/TTSMessage'
          description: The TTS parameters of the message which will be played during waiting times<br>One language allowed
        warning:
          $ref: '#/components/schemas/TTSMessage'
          description: The TTS parameters of the message which will be played in case of error<br>One language allowed
        inboundCall:
          $ref: '#/components/schemas/TTSMessage'
          description: The TTS parameters of the message which will be played when the user receives a call on its virtual number (before linking confirmation)<br>One language allowed<br>Used if inboundCallFlow = 'TWO_STEPS' <br>If not defined, a default message will be used
        outboundCall:
          $ref: '#/components/schemas/TTSMessage'
          description: 'The TTS parameters of the message which will be played to the user who makes a call with his virtual number (before linking)<br>One language allowed<br>Required if pickupOutboundCall = true '
        voicemail:
          $ref: '#/components/schemas/TTSMessage'
          description: The TTS parameters of the default voicemail greeting<br>One language allowed<br>Message should not be empty
        pincode:
          $ref: '#/components/schemas/TTSMessage'
          description: The TTS parameters of the message used for PIN code sending<br>If not defined, a default message will be used
        clickToCallConfirmation:
          $ref: '#/components/schemas/TTSMessage'
          description: The TTS parameters of the message which will be played to the user who makes a call with his virtual number in mode click-to-call (before linking confirmation)<br>One language allowed<br>If not defined, a default message will be used
        clickToCallFailure:
          $ref: '#/components/schemas/TTSMessage'
          description: The TTS parameters of the message which will be played to the user who makes a call in mode click-to-call in case of failure<br>One language allowed<br>If not defined, a default message will be used
      required:
        - voicemail
        - wait
        - warning
    CallConfirmationRequest:
      type: object
      properties:
        clickToCallConfirmation:
          type: boolean
          default: 'true'
          description: |
            A flag to control the click to call confirmation played message.<br>
    SelectAnUnassignedNumber:
      type: object
      properties:
        active:
          type: boolean
          description: Indicates if the configuration is active or not
        countryPrefix:
          type: string
          description: The main country of the number in ISO 3166-1 alpha-2 format
          example: FR
    UsageContextToCreate:
      type: object
      properties:
        userNumber:
          type: string
          description: The end-user phone (real) number<br>international format (ex. +33655887446)
        capabilities:
          type: array
          items:
            description: |-
              The capabilities the context.<br>
                  CALL_IN enables inbound calls<br>
                  CALL_OUT enables outbound calls<br>
                  VOICEMAIL enables voicemail features<br>
                  SHARED_VOICEMAIL enables shared voicemail feature<br>
                  SMS_MO (Mobile Originated) enables SMS sending<br>
                  SMS_MT (Mobile Terminated) enables SMS reception
            enum:
              - CALL_IN
              - CALL_OUT
              - SMS_MO
              - SMS_MT
        aliasNumber:
          type: string
          description: The virtual phone number or its prefix<br>Should start at least by a valid international prefix matching the 'countryCode' attribute (ex. +33 for FR)
        pincodeActivationNumber:
          type: string
          description: |2
                   Indicates that the context will require an activation by PIN code, and defines the number to which this code will be sent.
                   USER: the activation PIN code will be sent to the user number
                   ALIAS: the activation PIN code will be sent to the alias number (only for EXTERNAL alias numbers)
          enum:
            - USER, ALIAS
        note:
          type: string
          description: Custom note
          maximum: 2000
        smsNotificationEmail:
          type: string
          description: An email to receive the SMS notifications
        ownerInfo:
          $ref: '#/components/schemas/OwnerInfo'
          description: Context owner information
        selectAnUnassignedNumber:
          $ref: '#/components/schemas/SelectAnUnassignedNumber'
          description: |
            Activate the use of an UnassignedNumber instead of providing a userNumber.<br>
            The context created will be in full dnd mode.
        callConfirmation:
          $ref: '#/components/schemas/CallConfirmationRequest'
          description: |
            Configuration to control the call confirmation played message.<br>
      required:
        - capabilities
        - userNumber
    ImminentCall:
      type: object
      properties:
        serviceNumber:
          type: string
          description: The service number to be called by the user in order to place his outbound call (it will be the targeted number itself, if it is not handled by the platform)<br>International format (ex. +33655887446)
      required:
        - serviceNumber

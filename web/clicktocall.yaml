        While Processing events for any resource, a push notification is being sent to callbacks urls and there is some handling is being performed as follow:
            *In case of 5XX exceptions:
                ->A retry mechanism is performed; re-push the event to the failed callbacks urls for maximum 3 times; after that the event will be saved with the cause of the exception and the number of the retries.
            *In case of 4XX exception:
                ->The error cause is saved to the event entity and no retries will be performed.
      operationId: getEvents
      parameters:
        - name: X-OAPI-Application-Id
          in: header
          description: The partner application ID (should be added by the API Factory)
          required: true
          schema:
            type: string
        - name: serviceId
